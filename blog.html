<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .news-card { background: #161b22; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        .news-card:hover { border-color: #58a6ff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .news-content { padding: 20px; }
        .news-tag { color: #58a6ff; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .news-card h3 { color: #f0f6fc; font-size: 1.4rem; line-height: 1.3; margin-bottom: 12px; }
        .news-card p { color: #8b949e; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
        .news-footer { margin-top: auto; padding: 15px 20px; border-top: 1px solid #30363d; color: #484f58; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="nav-logo"><span>TechNova</span></a></nav>
    <div id="news-grid" class="news-grid"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('posts.json').then(res => res.json()).then(posts => {
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                const grid = document.getElementById('news-grid');
                posts.forEach(post => {
                    const d = new Date(post.date);
                    const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r. | ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    grid.innerHTML += `
                        <article class="news-card" onclick="goToPost('${post.slug}')">
                            <div class="news-content">
                                <span class="news-tag">${post.category}</span>
                                <h3>${post.title}</h3>
                                <p>${post.excerpt}</p>
                            </div>
                            <div class="news-footer"><i class="far fa-clock"></i> ${fDate}</div>
                        </article>
                    `;
                });
            });
        });
        function goToPost(slug) { localStorage.setItem('selectedPostSlug', slug); window.location.href = 'post.html'; }
    </script>
</body>
</html>
