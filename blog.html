<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | TechNova</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .blog-header { margin-bottom: 50px; border-left: 5px solid var(--accent, #17f3d3); padding-left: 20px; }
        .blog-header h2 { font-size: 2.5rem; text-transform: uppercase; margin: 0; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .news-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .news-card:hover { border-color: var(--accent, #17f3d3); background: rgba(255, 255, 255, 0.05); }
        .news-card .date { font-size: 0.8rem; color: var(--accent, #17f3d3); margin-bottom: 10px; display: block; }
        .news-card h3 { margin: 0 0 15px 0; font-size: 1.4rem; line-height: 1.3; }
        .news-card p { color: #a0a0b8; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="nav-logo">TechNova</a></nav>
    <main class="blog-container">
        <header class="blog-header"><h2>Aktualności</h2></header>
        <div id="news-grid" class="news-grid"></div>
    </main>
    <script>
        fetch('posts.json').then(res => res.json()).then(posts => {
            posts.sort((a, b) => new Date(b.date) - new Date(a.date));
            const grid = document.getElementById('news-grid');
            posts.forEach(post => {
                const d = new Date(post.date);
                const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                grid.innerHTML += `
                    <div class="news-card" onclick="localStorage.setItem('selectedPostSlug', '${post.slug}'); window.location.href='post.html'">
                        <span class="date">${fDate}</span>
                        <h3>${post.title}</h3>
                        <p>${post.excerpt}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
