<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Blog | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px 5%; }
        .post-card { background: var(--card-bg, #1a1a2e); border-radius: 15px; padding: 25px; text-align: left; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .post-card:hover { transform: translateY(-5px); border-color: #17f3d3; }
        .post-meta { color: #17f3d3; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .post-card h3 { color: #fff; font-size: 1.5rem; margin-bottom: 15px; line-height: 1.2; }
        .post-card p { color: #a0a0b8; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><span>TechNova</span></a>
        <div><a href="index.html">Start</a><a href="blog.html">Blog</a></div>
    </nav>

    <div id="blog-grid" class="blog-grid">
        <div style="color: #17f3d3;">Ładowanie aktualności...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('posts.json')
                .then(res => res.json())
                .then(posts => {
                    // Sortowanie od najnowszego
                    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    const grid = document.getElementById('blog-grid');
                    grid.innerHTML = '';

                    posts.forEach(post => {
                        const d = new Date(post.date);
                        const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;

                        grid.innerHTML += `
                            <article class="post-card" onclick="goToPost('${post.slug}')">
                                <div class="post-meta">${post.category} | ${fDate}</div>
                                <h3>${post.title}</h3>
                                <p>${post.excerpt}</p>
                            </article>
                        `;
                    });
                });
        });
        function goToPost(slug) { localStorage.setItem('selectedPostSlug', slug); window.location.href = 'post.html'; }
    </script>
</body>
</html>
