<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | TechNova</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Styl kontenera bloga */
        .blog-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 80px 20px; 
        }

        .blog-header { 
            margin-bottom: 50px; 
            border-left: 5px solid var(--accent, #17f3d3); 
            padding-left: 20px; 
        }

        .blog-header h2 { 
            font-size: 2.8rem; 
            text-transform: uppercase; 
            margin: 0; 
            color: #fff;
            letter-spacing: -1px;
        }

        /* Siatka newsów */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
        }

        /* Karta posta */
        .news-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-card:hover { 
            border-color: var(--accent, #17f3d3); 
            background: rgba(255, 255, 255, 0.05); 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Formatowanie daty i kategorii */
        .card-meta { 
            font-size: 0.85rem; 
            color: var(--accent, #17f3d3); 
            margin-bottom: 15px; 
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .news-card h3 { 
            margin: 0 0 15px 0; 
            font-size: 1.6rem; 
            line-height: 1.2; 
            color: #fff;
        }

        .news-card p { 
            color: #a0a0b8; 
            font-size: 1rem; 
            line-height: 1.6; 
            margin-bottom: 20px;
        }

        .read-more {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Loader */
        #loading { color: var(--accent); text-align: center; padding: 50px; font-size: 1.5rem; }

        @media (max-width: 768px) {
            .blog-header h2 { font-size: 2rem; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fab fa-github"></i>
            <span>TechNova</span>
        </a>
        <div>
            <a href="index.html">Start</a>
            <a href="o-nas.html">O nas</a>
            <a href="projekty.html">Projekty</a>
            <a href="blog.html">Blog</a>
            <a href="zespol.html">Zespół</a>
            <a href="kontakt.html">Kontakt</a>
        </div>
    </nav>

    <main class="blog-container">
        <header class="blog-header">
            <h2>Aktualności</h2>
        </header>

        <div id="news-grid" class="news-grid">
            <div id="loading"><i class="fas fa-spinner fa-spin"></i> Ładowanie artykułów...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('posts.json')
                .then(response => response.json())
                .then(posts => {
                    // 1. Sortowanie: Od najnowszego do najstarszego
                    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                    const grid = document.getElementById('news-grid');
                    grid.innerHTML = ''; // Czyścimy loader

                    posts.forEach(post => {
                        // 2. Formatowanie daty na: 28.03.2026 22:00
                        const d = new Date(post.date);
                        const day = d.getDate().toString().padStart(2, '0');
                        const month = (d.getMonth() + 1).toString().padStart(2, '0');
                        const year = d.getFullYear();
                        const hours = d.getHours().toString().padStart(2, '0');
                        const minutes = d.getMinutes().toString().padStart(2, '0');
                        
                        const formattedDate = `${day}.${month}.${year} ${hours}:${minutes}`;

                        // 3. Generowanie HTML karty
                        grid.innerHTML += `
                            <article class="news-card" onclick="openPost('${post.slug}')">
                                <div>
                                    <div class="card-meta">
                                        <span>${post.category}</span>
                                        <span style="color: #666;">${formattedDate}</span>
                                    </div>
                                    <h3>${post.title}</h3>
                                    <p>${post.excerpt}</p>
                                </div>
                                <div class="read-more">
                                    Czytaj więcej <i class="fas fa-arrow-right"></i>
                                </div>
                            </article>
                        `;
                    });
                })
                .catch(err => {
                    console.error("Błąd ładowania postów:", err);
                    document.getElementById('news-grid').innerHTML = "<p style='color:red;'>Błąd podczas ładowania bazy danych.</p>";
                });
        });

        // Funkcja zapamiętująca wybrany post i przenosząca do post.html
        function openPost(slug) {
            localStorage.setItem('selectedPostSlug', slug);
            window.location.href = 'post.html';
        }
    </script>

</body>
</html>
