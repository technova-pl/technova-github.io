<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; text-align: left; }
        .blog-header { margin-bottom: 50px; border-left: 5px solid var(--accent, #17f3d3); padding-left: 20px; }
        .blog-header h2 { font-size: 2.5rem; text-transform: uppercase; margin: 0; color: #fff; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .news-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px; border-radius: 8px; 
            cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .news-card:hover { border-color: var(--accent, #17f3d3); background: rgba(255, 255, 255, 0.05); }
        .news-card .date { font-size: 0.8rem; color: var(--accent, #17f3d3); margin-bottom: 10px; display: block; font-weight: bold; }
        .news-card h3 { margin: 0 0 15px 0; font-size: 1.4rem; line-height: 1.3; color: #fff; }
        .news-card p { color: #a0a0b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; flex-grow: 1; }
        .read-more { font-size: 0.9rem; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">TechNova</a>
        <div><a href="index.html">Start</a><a href="blog.html" class="active">Blog</a></div>
    </nav>
    <main class="blog-container">
        <header class="blog-header"><h2>Aktualności</h2></header>
        <div id="news-grid" class="news-grid"></div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('posts.json').then(res => res.json()).then(posts => {
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';
                posts.forEach(post => {
                    // FORMATOWANIE DATY: 28.03.2026 21:10
                    const d = new Date(post.date);
                    const day = d.getDate().toString().padStart(2, '0');
                    const month = (d.getMonth() + 1).toString().padStart(2, '0');
                    const year = d.getFullYear();
                    const hours = d.getHours().toString().padStart(2, '0');
                    const minutes = d.getMinutes().toString().padStart(2, '0');
                    const fDate = `${day}.${month}.${year} ${hours}:${minutes}`;

                    grid.innerHTML += `
                        <article class="news-card" onclick="localStorage.setItem('selectedPostSlug', '${post.slug}'); window.location.href='post.html'">
                            <span class="date">${fDate}</span>
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                            <span class="read-more">Czytaj więcej <i class="fas fa-arrow-right"></i></span>
                        </article>`;
                });
            });
        });
    </script>
</body>
</html>
