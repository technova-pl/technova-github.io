<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Blog | TechNova GitHub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .blog-header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 5% 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Styl karty generowanej dynamicznie */
        .post-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: left;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .post-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .post-category {
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .post-card h3 {
            margin: 10px 0;
            color: #fff;
            font-size: 1.4rem;
            line-height: 1.3;
        }

        .post-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .btn-read {
            align-self: flex-start;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-read:hover {
            background: var(--accent);
            color: #0f0f1a;
        }

        /* Loader podczas pobierania postów */
        #loader {
            color: var(--accent);
            font-size: 2rem;
            margin: 50px auto;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fab fa-github"></i>
            <span>TechNova GitHub</span>
        </a>
        <div>
            <a href="index.html">Start</a>
            <a href="o-nas.html">O nas</a>
            <a href="projekty.html">Projekty</a>
            <a href="zespol.html">Zespół</a>
            <a href="blog.html">Blog</a>
            <a href="kontakt.html">Kontakt</a>
        </div>
    </nav>

    <header class="blog-header">
        <h2>TechNova Insights</h2>
        <p style="color: var(--text-muted);">Najnowsze wieści ze świata prywatności i technologii.</p>
    </header>

    <main>
        <div id="blog-grid" class="blog-grid">
            <div id="loader"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-legal">
                <a href="polityka-prywatnosci.html">Polityka Prywatności</a>
                <a href="regulamin.html">Regulamin</a>
            </div>
            <div class="footer-copy">
                <p>&copy; 2026 TechNova GitHub. Created by <strong>Kacper Gnyp</strong>.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('blog-grid');
            const loader = document.getElementById('loader');

            // Pobieranie danych z pliku JSON
            fetch('posts.json')
                .then(response => {
                    if (!response.ok) throw new Error("Błąd ładowania postów");
                    return response.json();
                })
                .then(posts => {
                    loader.style.display = 'none'; // Ukryj loader
                    
                    // Sortowanie postów od najnowszego (jeśli id jest rosnące)
                    posts.reverse().forEach(post => {
                        const postHTML = `
                            <article class="post-card">
                                <div class="post-category">${post.category} | ${post.date}</div>
                                <h3>${post.title}</h3>
                                <p>${post.excerpt}</p>
                                <button onclick="goToPost('${post.slug}')" class="btn-read">
                                    Czytaj więcej <i class="fas fa-arrow-right" style="font-size: 0.7rem; margin-left: 5px;"></i>
                                </button>
                            </article>
                        `;
                        grid.innerHTML += postHTML;
                    });
                })
                .catch(err => {
                    loader.innerHTML = "<p style='color: red;'>Nie udało się załadować wpisów.</p>";
                    console.error(err);
                });
        });

        // Funkcja przekierowująca do podstrony posta
        function goToPost(slug) {
            localStorage.setItem('selectedPostSlug', slug);
            window.location.href = 'post.html';
        }
    </script>

</body>
</html>
