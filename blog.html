<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Blog | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <style>
        body { background-color: var(--bg-color, #0f0f1a); color: var(--text-main, #ffffff); }
        
        .blog-header { text-align: center; padding: 80px 20px 40px; }
        .blog-header h2 { font-size: 3rem; color: var(--accent, #17f3d3); text-transform: uppercase; letter-spacing: 2px; }

        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
            padding: 40px 5%; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .news-card { 
            background: var(--card-bg, rgba(255,255,255,0.03)); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 30px; 
            transition: 0.4s; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .news-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent, #17f3d3); 
            box-shadow: 0 15px 30px rgba(23, 243, 211, 0.1);
        }

        .news-tag { color: var(--accent, #17f3d3); font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; }
        .news-card h3 { font-size: 1.6rem; margin-bottom: 15px; color: #fff; }
        .news-card p { color: var(--text-muted, #a0a0b8); line-height: 1.6; font-size: 0.95rem; }
        .news-date { margin-top: auto; padding-top: 20px; color: rgba(255,255,255,0.3); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><i class="fab fa-github"></i><span>TechNova</span></a>
        <div>
            <a href="index.html">Start</a>
            <a href="o-nas.html">O nas</a>
            <a href="projekty.html">Projekty</a>
            <a href="blog.html">Blog</a>
            <a href="zespol.html">Zespół</a>
            <a href="kontakt.html">Kontakt</a>
        </div>
    </nav>

    <header class="blog-header">
        <h2>Aktualności</h2>
    </header>

    <div id="news-grid" class="news-grid"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('posts.json').then(res => res.json()).then(posts => {
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                const grid = document.getElementById('news-grid');
                posts.forEach(post => {
                    const d = new Date(post.date);
                    const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    grid.innerHTML += `
                        <article class="news-card" onclick="goToPost('${post.slug}')">
                            <span class="news-tag">${post.category}</span>
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                            <div class="news-date"><i class="far fa-calendar-alt"></i> ${fDate}</div>
                        </article>
                    `;
                });
            });
        });
        function goToPost(slug) { localStorage.setItem('selectedPostSlug', slug); window.location.href = 'post.html'; }
    </script>
</body>
</html>
