<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artykuł | TechNova</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styl bazowy dla treści posta */
        .article-container { 
            max-width: 900px; 
            margin: 60px auto; 
            padding: 0 20px 100px; 
            text-align: left; /* Wyrównanie do lewej */
        }

        .post-header { margin-bottom: 40px; }
        .post-category { color: var(--accent, #17f3d3); text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        #post-title { font-size: 3rem; color: #fff; margin: 15px 0; line-height: 1.2; font-weight: 800; }
        .post-date { color: #888; font-size: 1rem; margin-bottom: 30px; display: block; }

        /* Normalny tekst i lead */
        #post-lead { 
            font-size: 1.4rem; 
            color: #fff; 
            line-height: 1.6; 
            font-weight: 600; 
            margin-bottom: 40px; 
            padding-bottom: 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        /* Stylizacja nagłówków wewnątrz treści */
        #post-body { font-size: 1.15rem; line-height: 1.8; color: #ccc; }
        #post-body h2 { color: #fff; font-size: 1.8rem; margin: 40px 0 20px 0; font-weight: 700; }
        #post-body h3 { color: var(--accent, #17f3d3); font-size: 1.4rem; margin: 30px 0 15px 0; }
        #post-body p { margin-bottom: 25px; }

        /* Normalne listy */
        #post-body ul { margin: 20px 0; padding-left: 20px; }
        #post-body li { margin-bottom: 10px; list-style-type: disc; }

        @media (max-width: 768px) {
            #post-title { font-size: 2.2rem; }
            #post-lead { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <nav><a href="index.html" class="nav-logo">TechNova</a></nav>

    <main class="article-container">
        <header class="post-header">
            <span class="post-category" id="post-category"></span>
            <h1 id="post-title"></h1>
            <span class="post-date" id="post-date"></span>
        </header>

        <div id="post-lead"></div>
        <div id="post-body"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slug = localStorage.getItem('selectedPostSlug');
            if(!slug) { window.location.href = 'blog.html'; return; }

            fetch('posts.json').then(res => res.json()).then(posts => {
                const post = posts.find(p => p.slug === slug);
                if(post) {
                    const d = new Date(post.date);
                    const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    
                    document.getElementById('post-category').innerText = post.category;
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-date').innerText = fDate;
                    document.getElementById('post-lead').innerText = post.excerpt;
                    
                    const body = document.getElementById('post-body');
                    body.innerHTML = Array.isArray(post.content) ? post.content.join('') : post.content;
                }
            });
        });
    </script>
</body>
</html>
