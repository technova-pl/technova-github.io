<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artykuł | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        body { background-color: #0d1117; color: #c9d1d9; }
        
        .article-wrapper { max-width: 1100px; margin: 0 auto; padding: 40px 20px; opacity: 0; }
        .article-wrapper.show { animation: fadeIn 0.6s ease-in forwards; }

        /* Nagłówek Newsowy - Szeroki */
        .article-header { border-bottom: 1px solid #30363d; padding-bottom: 30px; margin-bottom: 40px; }
        .post-label { color: #58a6ff; font-weight: 800; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 15px; display: block; }
        #post-title { font-size: 3.8rem; color: #f0f6fc; line-height: 1.1; font-weight: 800; margin: 10px 0 25px; letter-spacing: -2px; }
        
        .meta-strip { display: flex; align-items: center; gap: 20px; color: #8b949e; font-size: 0.95rem; }
        .author-box { display: flex; align-items: center; gap: 10px; color: #f0f6fc; font-weight: 600; }
        .author-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #58a6ff; }

        /* Treść od lewej do prawej */
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 40px; }
        
        #post-lead { font-size: 1.5rem; line-height: 1.5; color: #f0f6fc; font-weight: 700; margin-bottom: 35px; border-left: 5px solid #58a6ff; padding-left: 25px; text-align: justify; }
        
        #post-body { font-size: 1.2rem; line-height: 1.8; text-align: left; }
        #post-body p { margin-bottom: 25px; }
        #post-body h2 { font-size: 2.2rem; color: #f0f6fc; margin: 50px 0 20px; border-top: 1px solid #30363d; padding-top: 30px; }
        
        /* Listy punktowane newsowe */
        #post-body ul { list-style: none; padding: 0; margin: 30px 0; }
        #post-body li { padding: 15px 20px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; }
        #post-body li::before { content: "●"; color: #58a6ff; font-weight: bold; margin-right: 15px; }

        #post-loader { text-align: center; padding: 100px; color: #58a6ff; font-size: 3rem; }

        @media (max-width: 900px) {
            #post-title { font-size: 2.5rem; }
            #post-lead { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <nav><a href="index.html" class="nav-logo"><span>TechNova</span></a></nav>

    <div id="post-loader"><i class="fas fa-circle-notch fa-spin"></i></div>

    <main id="post-display" class="article-wrapper">
        <header class="article-header">
            <span class="post-label" id="post-category">Kategoria</span>
            <h1 id="post-title"></h1>
            <div class="meta-strip">
                <div class="author-box">
                    <div style="background:#58a6ff; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#0d1117">KG</div>
                    Kacper Gnyp
                </div>
                <span>•</span>
                <span id="post-date"></span>
            </div>
        </header>

        <div class="main-layout">
            <div id="post-lead"></div>
            <article id="post-body"></article>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slug = localStorage.getItem('selectedPostSlug');
            if(!slug) { window.location.href = 'blog.html'; return; }

            fetch('posts.json').then(res => res.json()).then(posts => {
                const post = posts.find(p => p.slug === slug);
                if(post) {
                    const d = new Date(post.date);
                    const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    
                    document.getElementById('post-category').innerText = post.category;
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-date').innerText = fDate;
                    document.getElementById('post-lead').innerText = post.excerpt;
                    
                    const body = document.getElementById('post-body');
                    body.innerHTML = Array.isArray(post.content) ? post.content.join('') : post.content;

                    document.getElementById('post-loader').style.display = 'none';
                    const wrapper = document.getElementById('post-display');
                    wrapper.classList.add('show');
                }
            });
        });
    </script>
</body>
</html>
