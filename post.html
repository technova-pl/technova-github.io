<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Artykuł | TechNova GitHub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Kontener artykułu - węższy dla lepszego skupienia wzroku */
        .article-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 25px;
            text-align: left;
        }

        .article-header {
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(23, 243, 211, 0.1);
            padding-bottom: 30px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .post-meta-top {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        #post-title {
            font-size: 3rem;
            color: #fff;
            margin: 15px 0;
            line-height: 1.2;
        }

        .post-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Stylizacja treści właściwej */
        #post-body {
            line-height: 1.8;
            font-size: 1.15rem;
            color: var(--text-main);
        }

        #post-body p {
            margin-bottom: 25px;
        }

        #post-body h2 {
            color: #fff;
            margin-top: 45px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        #post-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 15px 25px;
            background: rgba(23, 243, 211, 0.03);
            font-style: italic;
            margin: 40px 0;
            color: var(--text-muted);
            border-radius: 0 10px 10px 0;
        }

        #post-body ul {
            margin-bottom: 25px;
            padding-left: 25px;
        }

        #post-body li {
            margin-bottom: 10px;
        }

        /* Loader */
        #post-loader {
            text-align: center;
            padding: 100px 0;
            color: var(--accent);
            font-size: 2.5rem;
        }

        @media (max-width: 768px) {
            #post-title { font-size: 2.2rem; }
            .article-container { margin: 30px auto; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fab fa-github"></i>
            <span>TechNova GitHub</span>
        </a>
        <div>
            <a href="index.html">Start</a>
            <a href="blog.html">Blog</a>
            <a href="projekty.html">Projekty</a>
        </div>
    </nav>

    <main class="article-container">
        <a href="blog.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Wróć do bloga
        </a>

        <div id="post-loader">
            <i class="fas fa-circle-notch fa-spin"></i>
        </div>

        <div id="post-display" style="display: none;">
            <header class="article-header">
                <div class="post-meta-top" id="post-category">Kategoria</div>
                <h1 id="post-title">Ładowanie tytułu...</h1>
                <div class="post-date" id="post-date">Data publikacji</div>
            </header>

            <section id="post-body">
                </section>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-copy">
                <p>&copy; 2026 TechNova GitHub. Created by <strong>Kacper Gnyp</strong>.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Pobieramy "slug" zapamiętany po kliknięciu w blog.html
            const selectedSlug = localStorage.getItem('selectedPostSlug');
            
            // Jeśli ktoś wejdzie bezpośrednio w post.html bez wybrania posta, wróć do bloga
            if (!selectedSlug) {
                window.location.href = 'blog.html';
                return;
            }

            // Pobieramy dane z pliku JSON
            fetch('posts.json')
                .then(response => {
                    if (!response.ok) throw new Error("Błąd bazy danych");
                    return response.json();
                })
                .then(posts => {
                    // Szukamy posta o odpowiednim slugu
                    const post = posts.find(p => p.slug === selectedSlug);

                    if (post) {
                        // Aktualizacja meta-danych strony
                        document.title = `${post.title} | TechNova Blog`;
                        
                        // Wstrzykiwanie treści
                        document.getElementById('post-category').innerText = post.category;
                        document.getElementById('post-title').innerText = post.title;
                        document.getElementById('post-date').innerText = post.date;
                        document.getElementById('post-body').innerHTML = post.content;

                        // Płynne przełączenie widoku
                        document.getElementById('post-loader').style.display = 'none';
                        document.getElementById('post-display').style.display = 'block';
                    } else {
                        document.getElementById('post-loader').innerHTML = "<p>Przepraszamy, nie znaleziono takiego artykułu.</p>";
                    }
                })
                .catch(err => {
                    console.error("Błąd ładowania:", err);
                    document.getElementById('post-loader').innerHTML = "<p>Błąd ładowania treści. Spróbuj odświeżyć stronę.</p>";
                });
        });
    </script>

</body>
</html>
