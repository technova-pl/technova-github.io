<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Wiadomości | TechNova</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-container {
            max-width: 850px; 
            margin: 40px auto;
            padding: 0 25px 100px;
            text-align: left;
            opacity: 0; 
        }

        .news-container.animate-in {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb span { margin: 0 8px; color: rgba(255,255,255,0.15); }

        .article-header {
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 30px;
        }

        #post-title {
            font-size: 3.5rem; 
            color: #fff;
            margin: 10px 0 25px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .post-meta-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .author-avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: rgba(23, 243, 211, 0.1);
            border: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-weight: bold;
        }

        #post-lead {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.6;
            color: #fff;
            margin-bottom: 45px;
            padding-left: 20px;
            border-left: 4px solid var(--accent);
        }

        #post-body {
            line-height: 1.9;
            font-size: 1.15rem;
            color: var(--text-main);
        }

        #post-body p { margin-bottom: 28px; }

        #post-body h2 {
            color: #fff;
            margin-top: 55px; margin-bottom: 25px;
            font-size: 2.1rem;
            font-weight: 700;
        }

        #post-body ul {
            margin-bottom: 30px;
            padding-left: 0;
            list-style-type: none;
        }

        #post-body li {
            position: relative;
            margin-bottom: 12px;
            padding-left: 30px;
        }

        #post-body li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        #post-loader { text-align: center; padding: 100px 0; color: var(--accent); font-size: 2.5rem; }

        @media (max-width: 768px) {
            #post-title { font-size: 2.4rem; }
            .news-container { margin: 20px auto; padding: 0 15px 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <i class="fab fa-github"></i>
            <span>TechNova GitHub</span>
        </a>
        <div><a href="blog.html">Powrót do bloga</a></div>
    </nav>

    <main>
        <div id="post-loader">
            <i class="fas fa-spinner fa-spin"></i>
        </div>

        <div id="post-display" class="news-container">
            <div class="breadcrumb">
                <a href="index.html">TechNova</a> <span>/</span> <a href="blog.html">Blog</a> <span>/</span> <span id="post-category-bc"></span>
            </div>

            <header class="article-header">
                <h1 id="post-title"></h1>
                <div class="post-meta-bar">
                    <div class="author-avatar">KG</div>
                    <div>
                        <div style="color: #fff; font-weight: bold;">Kacper Gnyp</div>
                        <div id="post-date"></div>
                    </div>
                </div>
            </header>

            <div id="post-lead"></div>
            <section id="post-body"></section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selectedSlug = localStorage.getItem('selectedPostSlug');
            if (!selectedSlug) { window.location.href = 'blog.html'; return; }

            fetch('posts.json')
                .then(response => response.json())
                .then(posts => {
                    const post = posts.find(p => p.slug === selectedSlug);

                    if (post) {
                        document.title = `${post.title} | TechNova`;
                        
                        const d = new Date(post.date);
                        const formattedDate = `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth() + 1).toString().padStart(2, '0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                        
                        document.getElementById('post-category-bc').innerText = post.category;
                        document.getElementById('post-title').innerText = post.title;
                        document.getElementById('post-date').innerText = formattedDate;
                        document.getElementById('post-lead').innerText = post.excerpt;

                        // KLUCZOWA POPRAWKA: Łączymy tablicę w jeden tekst HTML
                        if (Array.isArray(post.content)) {
                            document.getElementById('post-body').innerHTML = post.content.join('');
                        } else {
                            // Obsługa starego formatu (jeśli post był pojedynczym tekstem)
                            document.getElementById('post-body').innerHTML = post.content;
                        }

                        document.getElementById('post-loader').style.display = 'none';
                        const display = document.getElementById('post-display');
                        display.style.display = 'block';
                        setTimeout(() => display.classList.add('animate-in'), 50); 
                    }
                })
                .catch(err => {
                    document.getElementById('post-loader').innerHTML = "Błąd ładowania treści.";
                });
        });
    </script>
</body>
</html>
