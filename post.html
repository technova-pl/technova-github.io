<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="69808941280.png">
    <title>Artykuł | TechNova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .news-container { max-width: 850px; margin: 40px auto; padding: 0 20px 80px; text-align: left; }
        .breadcrumb { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        #post-title { font-size: 3.2rem; color: #fff; line-height: 1.1; font-weight: 800; margin-bottom: 25px; }
        .meta-info { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-bottom: 30px; color: var(--text-muted); font-size: 0.9rem; }
        #post-lead { font-size: 1.35rem; font-weight: 700; line-height: 1.6; color: #fff; margin-bottom: 35px; border-left: 4px solid var(--accent); padding-left: 20px; }
        #post-body { line-height: 1.9; font-size: 1.15rem; color: var(--text-main); }
        #post-body h2 { color: #fff; margin: 40px 0 20px; border-bottom: 1px solid rgba(23,243,211,0.2); padding-bottom: 10px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="nav-logo"><span>TechNova GitHub</span></a></nav>

    <main class="news-container">
        <div id="loader" style="text-align:center; padding: 50px; color: var(--accent);"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        
        <div id="content-area" style="display:none;">
            <div class="breadcrumb"><a href="blog.html">Blog</a> <span>/</span> <span id="bc-cat"></span></div>
            <h1 id="post-title"></h1>
            <div class="meta-info">Redakcja TechNova | <span id="post-date"></span></div>
            <div id="post-lead"></div>
            <section id="post-body"></section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slug = localStorage.getItem('selectedPostSlug');
            if(!slug) { window.location.href = 'blog.html'; return; }

            fetch('posts.json').then(res => res.json()).then(posts => {
                const post = posts.find(p => p.slug === slug);
                if(post) {
                    const d = new Date(post.date);
                    const fDate = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}r., ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    
                    document.getElementById('bc-cat').innerText = post.category;
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-date').innerText = fDate;
                    document.getElementById('post-lead').innerText = post.excerpt;
                    document.getElementById('post-body').innerHTML = post.content;
                    
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content-area').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
